<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Instagram</title>
    <script src="https://kit.fontawesome.com/36b374186f.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" src="styles.css">
</head>

<body>
    <!-- Nav bar -->
    <nav class="navbar navbar-light bg-white border-bottom shadow-sm mb-2">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <span class="navbar-brand">
                <i class="fa-brands fa-instagram fa-lg">&nbsp;</i><strong>Instagram</strong></span>

            <!-- Botones superior derecha  -->
            <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#exampleModal"
                    data-bs-whatever="@getbootstrap">Create a new post</button>
                <!-- Boton con dropdown    -->
                <div class="btn-group me-5">
                    <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-haspopup="true"
                        aria-expanded="false"><i class="fas fa-cog"></i>
                    </button>
                    <div class="d-flex align-items-center me-5">
                        <ul class="dropdown-menu">
                            <li><button class="dropdown-item" type="button">Profile</button></li>
                            <li><button class="dropdown-item" type="button">Accesibility</button></li>
                            <li><button class="dropdown-item" type="button">Privacy and Data</button></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><button class="dropdown-item text-danger" type="button">Log out</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <!--  Modal crear nuevo post -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Create a new post</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="message-text" class="col-form-label">Caption:</label>
                                <textarea class="form-control" id="message-text"></textarea>
                            </div>
                            <span><i class="fa-solid fa-camera fa-lg me-2 bg-light"></i>
                                <i class="fa-solid fa-location-dot fa-lg bg-light"></i></span>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-success">Publish</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Selector de grid/individual -->
    <div class="icon-bar d-flex justify-content-center mt-5">
        <i class="fas fa-th fa-lg me-3"></i>
        <i class="fas fa-square fa-lg"></i>
    </div>

    <!-- Galería tipo grid -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-4 mt-5 mb-3">
                <img src="https://picsum.photos/id/1011/600/600" class="square-img">
            </div>
            <div class="col-4 mt-5 mb-3">
                <img src="https://picsum.photos/id/1015/600/600" class="square-img">
            </div>
            <div class="col-4 mt-5 mb-3">
                <img src="https://picsum.photos/id/1016/600/600" class="square-img">
            </div>
            <div class="col-4 mb-3">
                <img src="https://picsum.photos/id/1025/600/600" class="square-img">
            </div>
            <div class="col-4 mb-3">
                <img src="https://picsum.photos/id/1031/600/600" class="square-img">
            </div>
            <div class="col-4 mb-3">
                <img src="https://picsum.photos/id/1033/600/600" class="square-img">
            </div>
            <div class="col-4 mb-3">
                <img src="https://picsum.photos/id/1035/600/600" class="square-img">
            </div>
            <div class="col-4 mb-3">
                <img src="https://picsum.photos/id/1014/600/600" class="square-img">
            </div>
            <div class="col-4 mb-3">
                <img src="https://picsum.photos/id/1042/600/600" class="square-img">
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
